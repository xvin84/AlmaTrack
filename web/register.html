<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - AlmaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">

    <h1 class="text-2xl font-bold text-center mb-6">Регистрация</h1>

    <form action="register.php" method="POST">

        <input type="text" name="full_name" required
        placeholder="Логин"
        class="w-full mb-3 p-2 border rounded">

        <input type="email" name="email"
        placeholder="Email (необязательно)"
        class="w-full mb-3 p-2 border rounded">

        <input type="password" name="password" required
        placeholder="Пароль"
        class="w-full mb-4 p-2 border rounded">

        <button type="submit"
        class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
            Зарегистрироваться
        </button>

    </form>

    <p class="text-center mt-4">
        Уже есть аккаунт?
        <a href="index.html" class="text-blue-600">Войти</a>
    </p>

</div>

</body>
</html>
