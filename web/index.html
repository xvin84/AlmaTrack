<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AlmaTrack - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, input, button, .card {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body id="body" class="bg-gray-100 h-screen flex items-center justify-center font-sans">

<button id="themeToggle"
    class="fixed bottom-6 left-6 w-14 h-14 flex items-center justify-center 
           rounded-full shadow-xl bg-white text-yellow-500
           transition-all duration-300 hover:scale-110 z-50 text-xl">
    <span id="themeIcon">🌙</span>
</button>

<div class="card bg-white p-8 rounded-lg shadow-md w-full max-w-sm">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">AlmaTrack</h1>
        <p class="text-sm text-gray-500 mt-2">Панель управления ВУЗа</p>
    </div>

    <form action="login.php" method="POST">
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Логин</label>
            <input 
                name="full_name"
                type="text"
                required
                placeholder="admin"
                class="shadow border rounded w-full py-2 px-3">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Пароль</label>
            <input 
                name="password"
                type="password"
                required
                placeholder="********"
                class="shadow border rounded w-full py-2 px-3">
        </div>

        <p class="text-center mt-4">
            Нет аккаунта?
            <a href="register.html" class="text-blue-600">Зарегистрироваться</a>
        </p>

        <button 
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">
            Войти
        </button>

    </form>

</div>

<script>
const body = document.getElementById("body");
const card = document.querySelector(".card");
const inputs = document.querySelectorAll("input");
const buttonSubmit = document.querySelector("button[type=submit]");
const themeButton = document.getElementById("themeToggle");
const icon = document.getElementById("themeIcon");

function setDark() {
    body.style.backgroundColor = "#111827";
    body.style.color = "#f3f4f6";
    card.style.backgroundColor = "#1f2937";
    card.style.color = "#f3f4f6";
    inputs.forEach(input => {
        input.style.backgroundColor = "#374151";
        input.style.color = "#f3f4f6";
        input.style.borderColor = "#6b7280";
    });
    buttonSubmit.style.backgroundColor = "#2563eb";
    buttonSubmit.style.color = "#fff";

    themeButton.style.backgroundColor = "#1f2937";
    themeButton.style.color = "#facc15";
    icon.textContent = "☀️";

    localStorage.setItem("theme", "dark");
}

function setLight() {
    body.style.backgroundColor = "#f3f4f6";
    body.style.color = "#111827";
    card.style.backgroundColor = "#ffffff";
    card.style.color = "#111827";
    inputs.forEach(input => {
        input.style.backgroundColor = "#ffffff";
        input.style.color = "#111827";
        input.style.borderColor = "#d1d5db";
    });
    buttonSubmit.style.backgroundColor = "#3b82f6";
    buttonSubmit.style.color = "#fff";

    themeButton.style.backgroundColor = "#ffffff";
    themeButton.style.color = "#111827";
    icon.textContent = "🌙";

    localStorage.setItem("theme", "light");
}

if(localStorage.getItem("theme") === "dark") { setDark(); } else { setLight(); }

themeButton.addEventListener("click", () => {
    if(localStorage.getItem("theme") === "dark") { setLight(); } else { setDark(); }
});
</script>

</body>
</html>
