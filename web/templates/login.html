<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AlmaTrack - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">
<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">AlmaTrack</h1>
        <p class="text-sm text-gray-500 mt-2">Панель управления ВУЗа</p>
    </div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
          {% for message in messages %}
            <span class="block sm:inline">{{ message }}</span>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Логин</label>
            <input name="username" type="text" required placeholder="admin" class="shadow border rounded w-full py-2 px-3">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Пароль</label>
            <input name="password" type="password" required placeholder="********" class="shadow border rounded w-full py-2 px-3">
        </div>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">Войти</button>
    </form>
</div>
</body>
</html>
