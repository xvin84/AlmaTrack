<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmaTrack - Дашборд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="font-bold text-xl text-blue-600">AlmaTrack</div>
        <div class="space-x-4">
            <a href="dashboard.html" class="text-blue-600 font-medium">Дашборд</a>
            <a href="alumni.html" class="text-gray-500 hover:text-gray-800">Выпускники</a>
            <a href="login.html" class="text-gray-500 hover:text-red-500">Выход</a>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between border-l-4 border-blue-500">
                <div>
                    <p class="text-sm text-gray-500 mb-1">Всего студентов</p>
                    <h3 class="text-3xl font-bold">247</h3>
                </div>
                <div class="text-3xl">📊</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between border-l-4 border-green-500">
                <div>
                    <p class="text-sm text-gray-500 mb-1">Компаний-работодателей</p>
                    <h3 class="text-3xl font-bold">89</h3>
                </div>
                <div class="text-3xl">🏢</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between border-l-4 border-purple-500">
                <div>
                    <p class="text-sm text-gray-500 mb-1">Охвачено городов</p>
                    <h3 class="text-3xl font-bold">12</h3>
                </div>
                <div class="text-3xl">🌍</div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow mb-8 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Факультет</label>
                <select class="border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"><option>Все</option><option>ФИИТ</option></select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Год выпуска</label>
                <select class="border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"><option>Все</option><option>2024</option></select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Формат работы</label>
                <select class="border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"><option>Все</option><option>Удаленка</option></select>
            </div>
            <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded text-sm transition">Сбросить</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h4 class="text-lg font-semibold mb-4 text-gray-700">Топ-10 работодателей</h4>
                <canvas id="employersChart" height="200"></canvas>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow">
                <h4 class="text-lg font-semibold mb-4 text-gray-700">Уровни (Intern/Jr/Mid/Sr)</h4>
                <div class="relative h-64 w-full flex justify-center">
                    <canvas id="levelsChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h4 class="text-lg font-semibold mb-4 text-gray-700">Карьерный рост по годам выпуска</h4>
                <canvas id="growthChart" height="200"></canvas>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h4 class="text-lg font-semibold mb-4 text-gray-700">Топ-7 городов</h4>
                <canvas id="citiesChart" height="200"></canvas>
            </div>
        </div>

    </div>

    <script>
        // Общие настройки
        Chart.defaults.font.family = 'Inter, sans-serif';
        Chart.defaults.color = '#6b7280';

        // 1. Топ работодателей (Горизонтальный бар)
        new Chart(document.getElementById('employersChart'), {
            type: 'bar',
            data: {
                labels: ['Яндекс', 'Сбер', 'VK', 'Тинькофф', 'Ozon'],
                datasets: [{ label: 'Студентов', data: [45, 38, 25, 20, 15], backgroundColor: '#3b82f6' }]
            },
            options: { indexAxis: 'y', responsive: true }
        });

        // 2. Уровни (Пай-чарт)
        new Chart(document.getElementById('levelsChart'), {
            type: 'doughnut',
            data: {
                labels: ['Intern', 'Junior', 'Middle', 'Senior'],
                datasets: [{ data: [30, 45, 20, 5], backgroundColor: ['#9ca3af', '#60a5fa', '#34d399', '#f87171'] }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // 3. Карьерный рост (Линейный)
        new Chart(document.getElementById('growthChart'), {
            type: 'line',
            data: {
                labels: ['2020', '2021', '2022', '2023', '2024'],
                datasets: [
                    { label: 'Месяцев до Junior', data: [12, 10, 8, 7, 6], borderColor: '#3b82f6', tension: 0.3 },
                    { label: 'Месяцев до Middle', data: [24, 22, 18, 16, null], borderColor: '#10b981', tension: 0.3 }
                ]
            },
            options: { responsive: true }
        });

        // 4. Топ городов (Горизонтальный бар)
        new Chart(document.getElementById('citiesChart'), {
            type: 'bar',
            data: {
                labels: ['Москва', 'Санкт-Петербург', 'Екатеринбург', 'Казань', 'Новосибирск'],
                datasets: [{ label: 'Студентов', data: [120, 80, 25, 15, 7], backgroundColor: '#8b5cf6' }]
            },
            options: { indexAxis: 'y', responsive: true }
        });
    </script>
</body>
</html>
