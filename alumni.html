<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmaTrack - Выпускники</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center mb-8">
        <div class="font-bold text-xl text-blue-600">AlmaTrack</div>
        <div class="space-x-4">
            <a href="dashboard.html" class="text-gray-500 hover:text-gray-800">Дашборд</a>
            <a href="alumni.html" class="text-blue-600 font-medium">Выпускники</a>
            <a href="login.html" class="text-gray-500 hover:text-red-500">Выход</a>
        </div>
    </nav>

    <div class="container mx-auto px-6">
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800">Реестр студентов и выпускников</h2>
                <input type="text" placeholder="Поиск по компании..." class="border rounded px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full whitespace-nowrap">
                    <thead class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-3">Факультет</th>
                            <th class="px-6 py-3">Год выпуска</th>
                            <th class="px-6 py-3">Уровень</th>
                            <th class="px-6 py-3">Компания</th>
                            <th class="px-6 py-3">Формат</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 text-sm">
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 font-medium text-gray-900">Прикладная математика</td>
                            <td class="px-6 py-4 text-gray-500">2023</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-xs">Middle</span></td>
                            <td class="px-6 py-4 text-gray-700">Яндекс</td>
                            <td class="px-6 py-4 text-gray-500">Гибрид</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 font-medium text-gray-900">ФИИТ</td>
                            <td class="px-6 py-4 text-gray-500">2025 (студент)</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 bg-gray-100 text-gray-800 rounded-full text-xs">Intern</span></td>
                            <td class="px-6 py-4 text-gray-700">VK</td>
                            <td class="px-6 py-4 text-gray-500">Удаленка</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 font-medium text-gray-900">Программная инженерия</td>
                            <td class="px-6 py-4 text-gray-500">2022</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs">Senior</span></td>
                            <td class="px-6 py-4 text-gray-700">Сбер</td>
                            <td class="px-6 py-4 text-gray-500">Офис</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-between items-center">
                <span class="text-sm text-gray-500">Показано 3 из 247 записей</span>
                <div class="space-x-2">
                    <button class="px-3 py-1 border rounded text-sm disabled:opacity-50">Назад</button>
                    <button class="px-3 py-1 border rounded text-sm bg-white hover:bg-gray-50">Вперед</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
